name: Deploy Clientli

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Deploy static site to Cloudflare Pages
  deploy-site:
    name: Site → Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken:    ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:   ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: clientli
          directory:   site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Deploy Cloudflare Worker (API proxy)
  # NOTE: Secrets (DEEPSEEK_API_KEY etc.) must be set via wrangler CLI FIRST
  # Run manually once: cd worker && wrangler secret put DEEPSEEK_API_KEY
  # After that, this job redeploys the Worker code on every push
  deploy-worker:
    name: Worker → Cloudflare Workers
    runs-on: ubuntu-latest
    # Only run if worker files changed
    if: |
      github.event_name == 'push' &&
      contains(join(github.event.commits.*.modified, ','), 'worker/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Deploy Worker
        working-directory: worker
        run: wrangler deploy --no-bundle
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
