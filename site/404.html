<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page not found · AI Clientli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#080B1A;--indigo:#5B4FE9;--indigo-2:#7B72F0;--indigo-glow:rgba(91,79,233,0.14);--emerald:#2DD4A0;--ice:#F0EEF8;--ice-2:#C8C5DE;--slate:#8B8FA8;--border:rgba(255,255,255,0.07);--border-2:rgba(255,255,255,0.12);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--ice);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;-webkit-font-smoothing:antialiased;overflow:hidden;}
h1,h2{font-family:'Plus Jakarta Sans',sans-serif;}
a{color:inherit;text-decoration:none;}

.glow{position:fixed;border-radius:50%;pointer-events:none;}
.glow-1{width:600px;height:600px;background:radial-gradient(circle,rgba(91,79,233,0.14) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-60%);}
.glow-2{width:300px;height:300px;background:radial-gradient(circle,rgba(45,212,160,0.07) 0%,transparent 70%);bottom:10%;right:10%;}

.logo{display:inline-flex;align-items:center;gap:10px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:18px;letter-spacing:-0.03em;margin-bottom:60px;opacity:0.7;transition:opacity 0.2s;}
.logo:hover{opacity:1;}
.logo-mark{width:28px;height:28px;background:var(--indigo);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;}

.err-code{font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(100px,20vw,180px);font-weight:800;letter-spacing:-0.06em;line-height:1;background:linear-gradient(135deg,rgba(91,79,233,0.3),rgba(45,212,160,0.2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;animation:float 6s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}

.err-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(20px,3vw,32px);font-weight:700;letter-spacing:-0.03em;margin-bottom:12px;}
.err-sub{font-size:15px;color:var(--slate);max-width:420px;margin:0 auto 44px;line-height:1.7;}

.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:60px;}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Inter',sans-serif;font-weight:500;border-radius:10px;cursor:pointer;transition:all 0.2s;border:none;font-size:14px;padding:12px 24px;}
.btn-primary{background:var(--indigo);color:#fff;}
.btn-primary:hover{background:var(--indigo-2);transform:translateY(-1px);box-shadow:0 8px 24px rgba(91,79,233,0.35);}
.btn-ghost{background:transparent;border:1px solid var(--border-2);color:var(--ice-2);}
.btn-ghost:hover{border-color:rgba(255,255,255,0.25);color:var(--ice);}

.quick-links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.quick-link{padding:7px 16px;border-radius:20px;border:1px solid var(--border);font-size:12px;color:var(--slate);transition:all 0.2s;}
.quick-link:hover{border-color:var(--indigo-2);color:var(--indigo-2);}
.quick-links-label{width:100%;font-size:11px;color:var(--slate);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;}
</style>

<style>
@media(max-width:900px){
  .nav-links{display:none!important;}
  #navToggle{display:flex!important;}
  .btn-ghost{display:none;}
}
</style>
</head>
<body>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<a href="index.html" class="logo">
  <div class="logo-mark">⚡</div>
  AI Clientli
</a>

<div class="err-code">404</div>
<h1 class="err-title">This page doesn't exist</h1>
<p class="err-sub">The page you were looking for has moved, been deleted, or never existed. Let's get you back somewhere useful.</p>

<div class="actions">
  <a href="index.html" class="btn btn-primary">← Go home</a>
  <a href="blog.html" class="btn btn-ghost">Browse the blog</a>
</div>

<div class="quick-links">
  <div class="quick-links-label">Or jump to</div>
  <a href="features.html" class="quick-link">Features</a>
  <a href="index.html#pricing" class="quick-link">Pricing</a>
  <a href="compare.html" class="quick-link">Compare tools</a>
  <a href="about.html" class="quick-link">About</a>
  <a href="freelancer-guide.html" class="quick-link">Freelancer Guide</a>
  <a href="app.html" class="quick-link">Get early access</a>
</div>

<script>
function toggleMobileNav(){
  var m=document.getElementById('mobileNav'),b=document.getElementById('navToggle'),open=m.style.display==='none';
  m.style.display=open?'block':'none';b.textContent=open?'✕':'☰';
}
</script>
</body>
</html>
